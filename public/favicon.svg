<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- vinyl disc -->
  <circle cx="32" cy="32" r="31" fill="#1c1a18"/>
  <!-- grooves -->
  <g fill="none" stroke="#3a3632" stroke-width="1.4">
    <circle cx="32" cy="32" r="27"/>
    <circle cx="32" cy="32" r="23"/>
    <circle cx="32" cy="32" r="19"/>
  </g>
  <!-- soft sheen across the disc -->
  <path d="M14 14 A31 31 0 0 1 50 50" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="6" stroke-linecap="round"/>
  <!-- center label -->
  <circle cx="32" cy="32" r="12" fill="#c4632a"/>
  <circle cx="32" cy="32" r="12" fill="none" stroke="#a44e1d" stroke-width="1"/>
  <!-- spindle hole -->
  <circle cx="32" cy="32" r="2.4" fill="#1c1a18"/>
</svg>
